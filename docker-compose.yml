services:

  web:
    build:
      context: .
      args:
        # Override at build time: docker compose build --build-arg HUGO_BASE_URL=https://yourdomain.com/
        HUGO_BASE_URL: https://www.revistapelo.com.ar/
    image: revista-pelo:latest
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - traefik.enable=true
      # --- www: serve the site ---
      - traefik.http.routers.web-secure.rule=Host(`www.revistapelo.com.ar`)
      - traefik.http.routers.web-secure.entrypoints=websecure
      - traefik.http.routers.web-secure.tls=true
      - traefik.http.routers.web-secure.tls.certresolver=letsencrypt
      - traefik.http.services.web-secure.loadbalancer.server.port=80
      # --- bare domain: redirect to www ---
      - traefik.http.routers.bare-redirect.rule=Host(`revistapelo.com.ar`)
      - traefik.http.routers.bare-redirect.entrypoints=websecure
      - traefik.http.routers.bare-redirect.tls=true
      - traefik.http.routers.bare-redirect.tls.certresolver=letsencrypt
      - traefik.http.routers.bare-redirect.middlewares=bare-to-www
      - traefik.http.middlewares.bare-to-www.redirectregex.regex=^https://revistapelo\.com\.ar/(.*)
      - traefik.http.middlewares.bare-to-www.redirectregex.replacement=https://www.revistapelo.com.ar/$${1}
      - traefik.http.middlewares.bare-to-www.redirectregex.permanent=true

networks:
  proxy:
    external: true
