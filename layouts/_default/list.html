{{ partial "header.html" . }}

<div class="container">
  <div class="row">
    <div class="col-md-2" style="background-color: #B12C1B;">
      {{ partial "sidebar.html" . }}
    </div>

    <div class="col-md-10 main">
      <h1>{{ .Title }}</h1>
      {{ .Content }}
      <ul>
        {{ range .Pages }}
        <li><a href="{{ .Permalink }}">{{ .Title }}</a></li>
        {{ end }}
      </ul>
    </div>

  </div>
</div>

{{ partial "footer.html" . }}
